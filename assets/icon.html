<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; }
  /* Fixed px size (templated by scripts/gen-assets.js) anchored top-left so the
     headless screenshot captures it exactly regardless of viewport clamping.
     Internal proportions use em (1em == icon size). */
  .icon {
    position: absolute;
    top: 0; left: 0;
    width: __SIZE__px;
    height: __SIZE__px;
    font-size: __SIZE__px;
    background: linear-gradient(145deg, #244f86 0%, #1a3560 52%, #0f2340 100%);
    border-radius: 0.23em;
    overflow: hidden;
    box-shadow: inset 0 0 0 0.02em rgba(255, 255, 255, 0.06);
  }
  /* gold underline beneath the M - a clean nod to the highlight feature */
  .underline {
    position: absolute;
    left: 50%;
    bottom: 0.2em;
    width: 0.46em;
    height: 0.055em;
    margin-left: -0.23em;
    border-radius: 0.03em;
    background: #f3c94b;
    opacity: 0.9;
  }
  .m {
    position: absolute;
    left: 0; right: 0; top: -0.03em; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Arial Black", Arial, Helvetica, sans-serif;
    font-weight: 900;
    font-size: 0.66em;
    line-height: 1;
    color: #f3c94b;
    letter-spacing: -0.03em;
    text-shadow: 0 0.02em 0.05em rgba(0, 0, 0, 0.30);
  }
</style>
</head>
<body>
  <div class="icon">
    <div class="m">M</div>
    <div class="underline"></div>
  </div>
</body>
</html>
